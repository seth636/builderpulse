[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && node -e \"const {PrismaClient}=require('@prisma/client');const {execSync}=require('child_process');try{execSync('npx tsx prisma/seed.ts',{stdio:'inherit'})}catch(e){console.log('Seed skipped or already run')}\" && npm start"
